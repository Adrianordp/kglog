services:
  kglog:
    build:
      context: ./backend/
    container_name: kglog_prod
    ports:
      - "8001:8001"
    depends_on:
      - kglog_postgres
    command: gunicorn main:app --bind 0.0.0.0:8001

  kglog_postgres:
    image: postgres:16
    container_name: kglog_postgres_prod
    environment:
      POSTGRES_DB: kglog
      POSTGRES_USER: kglog
      POSTGRES_PASSWORD: kglog
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
